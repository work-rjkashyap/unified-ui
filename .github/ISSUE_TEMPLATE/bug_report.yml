name: Bug report
description: Report a reproducible bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps and sample input if relevant.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: repro
    attributes:
      label: Minimal reproduction
      description: Link to a minimal repo, StackBlitz, or sandbox.
      placeholder: https://github.com/your-user/repro
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs or add screenshots to help triage.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide versions and OS details.
      placeholder: |
        - OS:
        - Node.js:
        - npm:
        - Browser:
    validations:
      required: true
