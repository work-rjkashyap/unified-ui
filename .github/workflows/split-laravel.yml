# ============================================================================
# Subtree Split — Laravel Package
# ============================================================================
# Splits `packages/unified-ui-laravel/` into a standalone read-only repo
# (`imrj05/unified-ui-laravel`) so that Packagist can discover the
# `composer.json` at the repository root.
#
# Triggers:
#   - Every push to `main` that touches files in the Laravel package
#   - Manual dispatch (workflow_dispatch) for ad-hoc syncs
#
# Auto-tagging:
#   - On every qualifying push the workflow reads the `version` field from
#     `packages/unified-ui-laravel/composer.json`.
#   - If a tag `v<version>` does NOT already exist on the split repo it is
#     created automatically — no need to push a manual `laravel/v*` tag.
#   - If the tag already exists the step is skipped (idempotent).
#
# Requirements:
#   1. Create the target repo `imrj05/unified-ui-laravel` on GitHub (empty,
#      no README, no license — the split will push everything).
#   2. Create a Personal Access Token (classic) with `repo` scope, or a
#      fine-grained token with read/write access to the target repo.
#   3. Add the token as a secret named `SPLIT_TOKEN` in the monorepo
#      (Settings → Secrets and variables → Actions).
# ============================================================================

name: "Split Laravel Package"

on:
    push:
        branches:
            - main
        paths:
            - "packages/unified-ui-laravel/**"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: split-laravel-${{ github.ref }}
    cancel-in-progress: true

env:
    SPLIT_PACKAGE_DIR: packages/unified-ui-laravel
    SPLIT_TARGET_REPO: imrj05/unified-ui-laravel
    SPLIT_TARGET_BRANCH: main

jobs:
    split:
        name: Subtree Split
        runs-on: ubuntu-latest
        steps:
            - name: Checkout monorepo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.SPLIT_TOKEN }}

            # ------------------------------------------------------------------
            # Read the version from composer.json so we can auto-tag without
            # any manual `laravel/v*` tag push.
            # ------------------------------------------------------------------
            - name: Read version from composer.json
              id: version
              run: |
                  VERSION=$(jq -r '.version // empty' "${{ env.SPLIT_PACKAGE_DIR }}/composer.json")
                  if [[ -z "$VERSION" ]]; then
                    echo "⚠️  No 'version' field found in composer.json — skipping auto-tag"
                    echo "tag=" >> "$GITHUB_OUTPUT"
                  else
                    TAG="v${VERSION}"
                    echo "📦 Detected version: ${VERSION} → tag: ${TAG}"
                    echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
                  fi

            # ------------------------------------------------------------------
            # Use splitsh/lite for fast, reliable subtree splitting.
            # This extracts the package subdirectory into its own branch with
            # full, rewritten git history.
            # ------------------------------------------------------------------
            - name: Install splitsh-lite
              run: |
                  curl -fsSL https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz | tar xz
                  sudo mv splitsh-lite /usr/local/bin/splitsh-lite
                  chmod +x /usr/local/bin/splitsh-lite
                  splitsh-lite --version

            - name: Split subtree
              id: split
              run: |
                  SHA=$(splitsh-lite --prefix="${{ env.SPLIT_PACKAGE_DIR }}")
                  echo "sha=$SHA" >> "$GITHUB_OUTPUT"
                  echo "✅ Split SHA: $SHA"

            # ------------------------------------------------------------------
            # Push the split branch to the target read-only repo.
            # ------------------------------------------------------------------
            - name: Push split to target repo
              run: |
                  git remote add target "https://x-access-token:${{ secrets.SPLIT_TOKEN }}@github.com/${{ env.SPLIT_TARGET_REPO }}.git" 2>/dev/null || true
                  git push target "${{ steps.split.outputs.sha }}:refs/heads/${{ env.SPLIT_TARGET_BRANCH }}" --force
                  echo "✅ Pushed to ${{ env.SPLIT_TARGET_REPO }}@${{ env.SPLIT_TARGET_BRANCH }}"

            # ------------------------------------------------------------------
            # Auto-tag: check whether the version tag already exists on the
            # split repo. If it doesn't, create and push it so Packagist picks
            # up the new release automatically.
            # ------------------------------------------------------------------
            - name: Auto-tag split repo
              if: steps.version.outputs.tag != ''
              env:
                  TAG: ${{ steps.version.outputs.tag }}
                  SPLIT_SHA: ${{ steps.split.outputs.sha }}
              run: |
                  # Check if the tag already exists on the remote split repo.
                  EXISTING=$(git ls-remote --tags \
                    "https://x-access-token:${{ secrets.SPLIT_TOKEN }}@github.com/${{ env.SPLIT_TARGET_REPO }}.git" \
                    "refs/tags/${TAG}" | awk '{print $1}')

                  if [[ -n "$EXISTING" ]]; then
                    echo "🏷  Tag ${TAG} already exists on ${{ env.SPLIT_TARGET_REPO }} (${EXISTING}) — skipping"
                    exit 0
                  fi

                  echo "🏷  Creating tag ${TAG} on ${{ env.SPLIT_TARGET_REPO }}"
                  git tag "${TAG}" "${SPLIT_SHA}" --force
                  git push target "refs/tags/${TAG}" --force
                  echo "✅ Pushed tag ${TAG} — Packagist will detect this as a new release 🚀"

            - name: Summary
              run: |
                  TAG="${{ steps.version.outputs.tag }}"

                  echo "## 📦 Laravel Package Split" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Source:** \`${{ env.SPLIT_PACKAGE_DIR }}/\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Target:** [\`${{ env.SPLIT_TARGET_REPO }}\`](https://github.com/${{ env.SPLIT_TARGET_REPO }})" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Split SHA:** \`${{ steps.split.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

                  if [[ -n "$TAG" ]]; then
                    echo "- **Version tag:** \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo "Packagist will detect this as a new release. 🚀" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo "⚠️ No version tag created — add a \`version\` field to \`composer.json\` to enable auto-tagging." >> "$GITHUB_STEP_SUMMARY"
                  fi
