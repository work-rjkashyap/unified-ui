# ============================================================================
# Automatic Changelog Generation
# ============================================================================
# On every push to `main`, this workflow:
#   1. Scans new commits since the last git tag (or last changelog update)
#   2. Parses Conventional Commit messages (feat:, fix:, refactor:, etc.)
#   3. Prepends new entries into the [Unreleased] section of CHANGELOG.md
#   4. Commits and pushes the update
#
# IMPORTANT: This does NOT overwrite the hand-written changelog.
# It only adds new commit entries to the [Unreleased] section.
# Tagged releases (## [0.2.1], ## [0.2.0], etc.) are never touched.
#
# Requirements:
#   - Commits follow Conventional Commits: https://www.conventionalcommits.org
#   - GITHUB_TOKEN has write permissions (enabled below)
# ============================================================================

name: Changelog

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: write

jobs:
    changelog:
        name: Update Changelog
        runs-on: ubuntu-latest

        # Don't run on commits made by this workflow (prevent infinite loop)
        if: >-
            !contains(github.event.head_commit.message, '[skip ci]') &&
            !contains(github.event.head_commit.message, 'chore(changelog)')

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Generate and prepend changelog entries
              shell: bash
              run: bash .github/scripts/generate-changelog.sh

            - name: Check for changes
              id: diff
              run: |
                  if git diff --quiet packages/unified-ui/CHANGELOG.md 2>/dev/null; then
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create changelog PR
              if: steps.diff.outputs.changed == 'true'
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: "chore(changelog): auto-update unreleased entries [skip ci]"
                  branch: ci/changelog-update
                  delete-branch: true
                  title: "chore(changelog): auto-update unreleased entries"
                  body: |
                      Automated changelog update generated from commits on `main`.

                      This PR updates:
                      - `packages/unified-ui/CHANGELOG.md`
                  add-paths: |
                      packages/unified-ui/CHANGELOG.md
