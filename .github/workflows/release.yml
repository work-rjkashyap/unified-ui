# ============================================================================
# Release & Publish Pipeline
# ============================================================================
# Triggered when a version tag (v*.*.*) is pushed. Builds the design system
# package, publishes it to npm, generates a GitHub Release with changelog
# notes, and rebuilds the component registry.
#
# Usage:
#   git tag v0.2.1
#   git push origin v0.2.1
#
# Requirements:
#   - NPM_TOKEN secret set in GitHub repo settings (Settings → Secrets)
#   - Commits follow Conventional Commits for changelog generation
#   - cliff.toml config exists at repo root
# ============================================================================

name: Release & Publish

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
    contents: write
    id-token: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

env:
    NODE_VERSION: "20"
    PACKAGE_DIR: packages/unified-ui

jobs:
    # --------------------------------------------------------------------------
    # 1. Validate — make sure the tag version matches package.json
    # --------------------------------------------------------------------------
    validate:
        name: Validate Tag
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.extract.outputs.version }}
            prerelease: ${{ steps.extract.outputs.prerelease }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Extract version from tag
              id: extract
              run: |
                  TAG="${GITHUB_REF#refs/tags/v}"
                  echo "version=$TAG" >> "$GITHUB_OUTPUT"

                  # Detect pre-release (e.g. v0.3.0-beta.1)
                  if [[ "$TAG" == *"-"* ]]; then
                    echo "prerelease=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "prerelease=false" >> "$GITHUB_OUTPUT"
                  fi

                  echo "📦 Tag version: $TAG"

            - name: Verify package.json version matches tag
              run: |
                  PKG_VERSION=$(node -p "require('./${{ env.PACKAGE_DIR }}/package.json').version")
                  TAG_VERSION="${{ steps.extract.outputs.version }}"

                  echo "package.json version: $PKG_VERSION"
                  echo "Git tag version:      $TAG_VERSION"

                  if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
                    echo "::error::Version mismatch! package.json ($PKG_VERSION) ≠ tag ($TAG_VERSION)"
                    echo "Update package.json version to $TAG_VERSION before tagging."
                    exit 1
                  fi

                  echo "✅ Versions match"

    # --------------------------------------------------------------------------
    # 2. Build — build the design system and registry
    # --------------------------------------------------------------------------
    build:
        name: Build
        runs-on: ubuntu-latest
        needs: validate
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build design system
              run: npm run build:ds

            - name: Build component registry
              run: npm run build:registry

            - name: Verify build output
              run: |
                  echo "── Design system dist ──"
                  ls -lh ${{ env.PACKAGE_DIR }}/dist/ | head -20

                  echo ""
                  echo "── Registry files ──"
                  ls public/r/*.json | wc -l | xargs -I{} echo "{} registry JSON files"

                  # Ensure critical files exist
                  test -f ${{ env.PACKAGE_DIR }}/dist/index.mjs || { echo "::error::Missing dist/index.mjs"; exit 1; }
                  test -f ${{ env.PACKAGE_DIR }}/dist/index.d.ts || { echo "::error::Missing dist/index.d.ts"; exit 1; }
                  test -f public/r/index.json || { echo "::error::Missing registry index.json"; exit 1; }

                  echo "✅ Build verified"

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-output
                  path: |
                      ${{ env.PACKAGE_DIR }}/dist/
                      public/r/
                  retention-days: 7

    # --------------------------------------------------------------------------
    # 3. Publish — push to npm registry
    # --------------------------------------------------------------------------
    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        needs: [validate, build]
        environment: npm
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: npm ci

            - name: Build design system
              run: npm run build:ds

            - name: Publish to npm
              working-directory: ${{ env.PACKAGE_DIR }}
              run: |
                  PRERELEASE="${{ needs.validate.outputs.prerelease }}"
                  VERSION="${{ needs.validate.outputs.version }}"

                  echo "📦 Publishing @work-rjkashyap/unified-ui@$VERSION"

                  if [ "$PRERELEASE" = "true" ]; then
                    echo "   (pre-release — tagged as 'next')"
                    npm publish --tag next --provenance --access public
                  else
                    npm publish --provenance --access public
                  fi

                  echo "✅ Published successfully"
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    # --------------------------------------------------------------------------
    # 4. Promote changelog — move [Unreleased] → [x.y.z] with today's date
    # --------------------------------------------------------------------------
    promote-changelog:
        name: Promote Changelog
        runs-on: ubuntu-latest
        needs: [validate, publish]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Promote [Unreleased] to versioned release
              run: |
                  set -euo pipefail

                  VERSION="${{ needs.validate.outputs.version }}"
                  TODAY=$(date +%Y-%m-%d)
                  CHANGELOG="packages/unified-ui/CHANGELOG.md"

                  echo "📋 Promoting [Unreleased] → [${VERSION}] — ${TODAY}"

                  node -e "
                    const fs = require('fs');
                    let content = fs.readFileSync('${CHANGELOG}', 'utf-8');

                    // Match the [Unreleased] heading
                    const unreleasedRegex = /^## \[Unreleased\]/m;

                    if (!unreleasedRegex.test(content)) {
                      // No [Unreleased] section — insert a new version heading before the first ## [
                      const firstVersion = content.match(/^## \[\d+/m);
                      if (firstVersion) {
                        const idx = firstVersion.index;
                        content = content.slice(0, idx)
                          + '## [${VERSION}] — ${TODAY}\n\n'
                          + content.slice(idx);
                      }
                      fs.writeFileSync('${CHANGELOG}', content);
                      console.log('✅ No [Unreleased] section — inserted version heading.');
                      process.exit(0);
                    }

                    // Replace [Unreleased] with the versioned heading, keep a fresh [Unreleased]
                    content = content.replace(
                      unreleasedRegex,
                      '## [Unreleased]\n\n---\n\n## [${VERSION}] — ${TODAY}'
                    );

                    // Clean up any duplicate --- separators that may result
                    content = content.replace(/---\n+---/g, '---');

                    // Remove empty [Unreleased] sections (just heading + --- with nothing between)
                    // Keep it but make sure it's clean
                    content = content.replace(
                      /## \[Unreleased\]\n+---/,
                      '## [Unreleased]\n---'
                    );

                    fs.writeFileSync('${CHANGELOG}', content);
                    console.log('✅ Promoted [Unreleased] → [${VERSION}] — ${TODAY}');
                  "

            - name: Commit changelog promotion
              run: |
                  VERSION="${{ needs.validate.outputs.version }}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add packages/unified-ui/CHANGELOG.md
                  # Only commit if there are changes
                  if ! git diff --cached --quiet; then
                    git commit -m "chore(changelog): promote Unreleased → v${VERSION} [skip ci]"
                    git push
                    echo "✅ Changelog promoted and pushed"
                  else
                    echo "ℹ️  No changelog changes to commit"
                  fi

    # --------------------------------------------------------------------------
    # 5. GitHub Release — create release with changelog notes
    # --------------------------------------------------------------------------
    release:
        name: GitHub Release
        runs-on: ubuntu-latest
        needs: [validate, publish, promote-changelog]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main

            - name: Extract release notes from CHANGELOG.md
              id: changelog
              run: |
                  set -euo pipefail

                  VERSION="${{ needs.validate.outputs.version }}"
                  CHANGELOG="packages/unified-ui/CHANGELOG.md"

                  # Extract the section for this version from the hand-written changelog
                  # Matches from "## [x.y.z]" until the next "## [" or end of file
                  node -e "
                    const fs = require('fs');
                    const content = fs.readFileSync('${CHANGELOG}', 'utf-8');
                    const version = '${VERSION}';

                    // Find the start of this version's section
                    const versionRegex = new RegExp('^## \\\\[' + version.replace(/\./g, '\\\\.') + '\\\\].*$', 'm');
                    const match = content.match(versionRegex);

                    if (!match) {
                      console.log('No changelog section found for v' + version);
                      // Write empty output
                      fs.writeFileSync(process.env.GITHUB_OUTPUT || '/dev/null', 'content=No detailed changelog available for this release.\n', { flag: 'a' });
                      process.exit(0);
                    }

                    const startIdx = match.index + match[0].length;
                    const rest = content.slice(startIdx);

                    // Find the next version heading or --- separator before it
                    const nextVersionMatch = rest.match(/^## \[\d+/m);
                    let endIdx;
                    if (nextVersionMatch) {
                      // Also trim any trailing --- before the next version
                      const beforeNext = rest.slice(0, nextVersionMatch.index);
                      endIdx = beforeNext.replace(/\n*---\n*$/, '').length;
                    } else {
                      endIdx = rest.length;
                    }

                    const notes = rest.slice(0, endIdx).trim();
                    // Write to GITHUB_OUTPUT using delimiter syntax for multiline
                    const outputFile = process.env.GITHUB_OUTPUT || '/dev/stdout';
                    const delimiter = 'CHANGELOG_EOF_' + Date.now();
                    fs.appendFileSync(outputFile, 'content<<' + delimiter + '\n' + notes + '\n' + delimiter + '\n');
                  "
              env:
                  GITHUB_OUTPUT: ${{ github.output }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.validate.outputs.version }}
                  name: v${{ needs.validate.outputs.version }}
                  body: |
                      ## 📦 @work-rjkashyap/unified-ui@${{ needs.validate.outputs.version }}

                      ```
                      npm i @work-rjkashyap/unified-ui@${{ needs.validate.outputs.version }}
                      ```

                      ---

                      ${{ steps.changelog.outputs.content }}

                      ---

                      **Full Changelog**: https://github.com/${{ github.repository }}/blob/main/packages/unified-ui/CHANGELOG.md
                  draft: false
                  prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
                  generate_release_notes: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Summary
              run: |
                  VERSION="${{ needs.validate.outputs.version }}"
                  echo "## 🎉 Release v$VERSION" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "- ✅ Published to [npm](https://www.npmjs.com/package/@work-rjkashyap/unified-ui/v/$VERSION)" >> "$GITHUB_STEP_SUMMARY"
                  echo "- ✅ Changelog promoted" >> "$GITHUB_STEP_SUMMARY"
                  echo "- ✅ GitHub Release created" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"
                  echo "npm i @work-rjkashyap/unified-ui@$VERSION" >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"
