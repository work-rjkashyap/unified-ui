# ============================================================================
# Lint CI
# ============================================================================
# Runs on every PR targeting main and on direct pushes to main.
# Executes Biome check across the entire repository to enforce code style
# and catch lint errors before merge.
# ============================================================================

name: lint

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: lint-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: "20"

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run Biome check
              run: npm run lint
